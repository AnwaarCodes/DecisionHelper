<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Decision Helper - Stop Overthinking. Get a Clear Direction.</title>
		<meta name="description" content="Answer a few questions and get a personalized roadmap for your career and life decisions." />
	</head>
	<body style="background-color:#000000;color:#f8fafc;visibility:visible;opacity:1;">
		<div id="root" style="visibility:visible;opacity:1;"></div>
		<script type="module" src="/src/main.jsx"></script>
		<script type="text/javascript">
			(function(l){
				if(l.search[1] === '/') {
					var decoded = l.search
					.slice(1)
					.split('&')
					.map(function(s){ return s.replace(/~and~/g, '&') })
					.join('?');
					window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash); 
				}
			})(window.location);
		</script>
	</body>
</html>
